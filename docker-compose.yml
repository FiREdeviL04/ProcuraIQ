version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vendorbridge
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://postgres:password@db:5432/vendorbridge?schema=public"
      JWT_SECRET: "supersecret"
      # Redis for background queue
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      # MinIO (S3) configuration for exports
      AWS_REGION: "us-east-1"
      AWS_S3_BUCKET: "vendorbridge-exports"
      AWS_ACCESS_KEY_ID: "minioadmin"
      AWS_SECRET_ACCESS_KEY: "minioadmin"
      AWS_S3_ENDPOINT: "http://minio:9000"
    depends_on:
      - db
      - redis
      - minio_setup
    ports:
      - "4000:4000"
  redis:
    image: redis:7
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  minio:
    image: minio/minio:RELEASE.2023-12-20T00-00-00Z
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  minio_setup:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 minioadmin minioadmin && mc mb --ignore-existing local/vendorbridge-exports"]
    restart: 'no'
volumes:
  db_data:
  minio_data:
  redis_data:
